# Render deployment config
# https://render.com/docs/yaml-spec

services:
  - type: web
    name: srikrishna-api
    runtime: node
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Set these in Render dashboard (do NOT hardcode secrets here):
      # MONGODB_URI, JWT_SECRET, STRIPE_SECRET_KEY, STRIPE_PUBLISHABLE_KEY,
      # STRIPE_WEBHOOK_SECRET, FRONTEND_URL, EMAIL_USER, EMAIL_PASS
    healthCheckPath: /health
